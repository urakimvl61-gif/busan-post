name: Publish to Telegram

on:
  push:
    paths:
      - post.txt          # запускается, когда меняется post.txt
  workflow_dispatch: {}    # позволяет запускать вручную из вкладки Actions

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Send post.txt to Telegram
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: |
          python3 - <<'PY'
          import os, urllib.request, urllib.parse
          token = os.environ["BOT_TOKEN"]
          chat  = os.environ["CHANNEL_ID"]
          text  = open("post.txt", encoding="utf-8").read()
          data  = urllib.parse.urlencode({
              "chat_id": chat,
              "text": text,
              "disable_web_page_preview": "true",
          }).encode()
          url = f"https://api.telegram.org/bot{token}/sendMessage"
          with urllib.request.urlopen(url, data=data, timeout=30) as r:
              print("HTTP", r.status)
              print(r.read().decode()[:500])
          PY
